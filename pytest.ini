[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short -m "not requires_external and not manual"
markers =
    integration: marks tests as integration tests
    slow: marks tests as slow
    requires_external: requires external services (Chrome/TikHub/YouTube API)
    manual: manual diagnostic tests, run explicitly
