version: "3.8"

services:
  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider
    container_name: pot-provider-dev
    restart: unless-stopped
    ports:
      - "${POT_PORT:-4416}:4416"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4416/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
