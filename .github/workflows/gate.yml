# Dropped into each repo as .github/workflows/gate.yml by scripts/onboard-repo.sh.
# The only per-repo file — the reusable gate itself lives in the PUBLIC org repo
# zlxlabs/gate (public repos can't `uses:` a private reusable workflow, and the
# org runner-group workflow allowlist only accepts org-owned workflows; the gate
# logic is generic, secrets stay elsewhere).
name: CI
on:
  pull_request:
    types: [opened, synchronize, reopened]

# The reusable gate requests `pull-requests: write` (for the Codex review comment).
# The caller MUST grant it here — otherwise the run fails at startup with a
# generic "workflow file issue" (reusable-workflow permission escalation).
permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  gate:
    uses: zlxlabs/gate/.github/workflows/gate.yml@main
    with:
      tier: personal        # personal | internal | saas
      runner: self          # self (self-hosted) | hosted (GitHub free minutes — cold repos / pilot)
      has_ui: false
      design_doc: ""        # e.g. docs/DESIGN.md
    secrets:
      # 失败通知 webhook。公开仓必须用 repo SECRET(fork PR 的 run 拿不到 secrets,
      # 防泄露刷群);私有仓可不配 secret,notify 会回落到同名 repo VARIABLE。
      FEISHU_CI_WEBHOOK: ${{ secrets.FEISHU_CI_WEBHOOK }}
